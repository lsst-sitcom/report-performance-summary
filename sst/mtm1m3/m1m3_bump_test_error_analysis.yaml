title: MTM1M3 Bump Test Error Analysis in real time
description: It makes an analysis of the failed FAs for recent bump test executions
authors:
  - name: David Sanmartim
    slack: dsanmartim
tags:
  - demo
parameters:
  past_time:
    type: string
    description: Number of days or hours to look back
    default: 36d
  notebook_client_name:
    type: string
    description: Name of the notebook client ("usdf_efd" or "summit_efd")
    default: "usdf_efd"
  ndays:
    type: integer
    description: Number of days to look back for bump test forces comparison
    default: 5
    